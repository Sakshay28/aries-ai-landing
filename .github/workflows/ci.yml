name: CI

# Regression gate — runs on every push and pull request. A deploy should be
# blocked when this fails (set this workflow as a required status check on the
# default branch in GitHub → Settings → Branches → Branch protection rules).
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      SKIP_ENV_VALIDATION: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 1. Types must be sound across the whole app.
      - name: Typecheck
        run: npx tsc --noEmit -p tsconfig.json

      # 2. Contact-name safeguards + unit tests.
      #    tests/no-placeholder-name-regression.test.ts is the placeholder gate:
      #    it fails the build if a placeholder display-name anti-pattern
      #    (a bare "there" literal, or `someName || 'Unknown'`) reappears
      #    anywhere in src/. tests/contact-name.test.ts covers the helper's
      #    edge cases (null / empty / there / Unknown / undefined / null /
      #    emoji / phone-like / duplicates / per-source).
      - name: Tests (contact-name + regression guard + full E2E flow)
        run: >-
          npx vitest run
          tests/contact-name.test.ts
          tests/no-placeholder-name-regression.test.ts
          tests/broadcast-recipient-e2e.test.ts
          tests/name-sanitize.test.ts
          tests/broadcast-v4-services.test.ts
          tests/broadcast-endpoints.test.ts
