# ──────────────────────────────────────────────────────────────
# Follow-Up & Escalation Cron — runs every 30 minutes
# ──────────────────────────────────────────────────────────────
# Vercel Hobby plan only allows daily crons. This GitHub Action
# replaces the 30-min cron for follow-up processing. It hits the
# same /api/cron/timeout endpoint that Vercel would call.
#
# Setup (one-time):
#   GitHub → Settings → Secrets & Variables → Actions → New secret
#   Name: CRON_SECRET   Value: (copy from Vercel env vars)
# ──────────────────────────────────────────────────────────────

name: Follow-Up Cron

on:
  schedule:
    # Every 30 minutes, 24/7
    - cron: '*/30 * * * *'
  # Allow manual trigger from GitHub UI for testing
  workflow_dispatch:

jobs:
  run-followups:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger follow-up processing
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            https://ariesai.in/api/cron/timeout)

          echo "Response status: $response"

          if [ "$response" != "200" ]; then
            echo "❌ Cron endpoint returned $response"
            exit 1
          fi

          echo "✅ Follow-up cron completed"
